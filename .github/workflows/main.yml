name: Fetch blockchain data every 8 hours

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python3 tx.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Divakar Raju Mandapati"
          git config --global user.email "draju@outlook.com"
          git add transactions.json
          git commit -m "Update transactions.json" || echo "No changes to commit"
          git push
